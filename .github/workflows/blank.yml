name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: RÃ©cupÃ©rer le code
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Trouver ou extraire le HTML
        run: |
          HTML=$(find . -not -path './.git/*' -not -path './node_modules/*' \
                        -not -path './android/*' -name "*.html" 2>/dev/null | head -1)
          if [ -z "$HTML" ]; then
            ZIP=$(find . -not -path './.git/*' -name "*.zip" 2>/dev/null | head -1)
            if [ -n "$ZIP" ]; then
              mkdir -p _zip_tmp && unzip -q "$ZIP" -d _zip_tmp
              HTML=$(find _zip_tmp -name "*.html" | head -1)
            fi
          fi
          if [ -z "$HTML" ]; then echo "ERREUR : aucun HTML" && exit 1; fi
          echo "HTML : $HTML" && echo "HTML_PATH=$HTML" >> $GITHUB_ENV

      - name: Injecter CSS+JS mobile, logo et crÃ©er le projet Android
        run: |
          python3 - << 'PYEOF'
          import os, shutil, re, base64

          html_src = os.environ['HTML_PATH']
          with open(html_src, 'r', encoding='utf-8', errors='replace') as f:
              html = f.read()

          # â”€â”€ 1. Viewport â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          html = re.sub(
              r'<meta[^>]*name=["\']viewport["\'][^>]*>',
              '<meta name="viewport" content="width=1024, initial-scale=0.5, '
              'minimum-scale=0.2, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">',
              html)

          # â”€â”€ 2. CSS compact + menus â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          mobile_css = """<style id="android-fix">
          .menubar{min-height:34px!important;height:34px!important;font-size:12px!important;padding:0 4px!important;}
          .menubar .logo img{height:20px!important;}
          .menubar .logo .wm{font-size:11px!important;}
          .menubar .logo .ver{font-size:10px!important;}
          .menubar .menu>button{padding:4px 8px!important;font-size:11px!important;}
          .transport{min-height:42px!important;height:42px!important;padding:2px 6px!important;gap:3px!important;}
          .transport .tbtn,.tbtn{width:32px!important;height:32px!important;font-size:13px!important;padding:0!important;}
          .transport .tempo,.bpm{font-size:17px!important;}
          #status{font-size:10px!important;padding:1px 6px!important;min-height:16px!important;line-height:16px!important;}
          .tabs{min-height:30px!important;height:30px!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;}
          .tab,.tabs button{padding:3px 10px!important;font-size:11px!important;white-space:nowrap!important;}
          .patternbar{min-height:28px!important;height:28px!important;padding:1px 6px!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;}
          .patternbar button,.pchip{font-size:11px!important;padding:2px 7px!important;height:24px!important;}
          .view{overflow:auto!important;-webkit-overflow-scrolling:touch!important;}
          .statusbar,#statBar,.stat-bar{font-size:10px!important;padding:1px 6px!important;min-height:16px!important;}
          .menu{position:relative;}
          .menu .dropdown{position:fixed!important;top:34px!important;z-index:99999!important;min-width:180px!important;max-height:80vh!important;overflow-y:auto!important;-webkit-overflow-scrolling:touch!important;}
          .menu .dropdown button,.menu .dropdown a{min-height:40px!important;padding:8px 16px!important;font-size:13px!important;display:flex!important;align-items:center!important;width:100%!important;text-align:left!important;}
          </style>"""

          mobile_js = """<script id="android-menu-fix">
          (function(){
            function fixMenus(){
              document.querySelectorAll('.menu').forEach(function(m){
                var btn=m.querySelector(':scope>button');
                if(!btn) return;
                btn.addEventListener('touchend',function(e){
                  e.preventDefault();e.stopPropagation();
                  var wasOpen=m.classList.contains('open');
                  document.querySelectorAll('.menu.open').forEach(function(x){x.classList.remove('open');});
                  if(!wasOpen) m.classList.add('open');
                },{passive:false});
              });
              document.addEventListener('touchend',function(e){
                if(!e.target.closest('.menu')) document.querySelectorAll('.menu.open').forEach(function(x){x.classList.remove('open');});
              },{passive:true});
              document.querySelectorAll('.menu .dropdown button,.menu .dropdown a').forEach(function(item){
                item.addEventListener('touchend',function(e){
                  e.preventDefault();e.stopPropagation();
                  document.querySelectorAll('.menu.open').forEach(function(x){x.classList.remove('open');});
                  this.click();
                },{passive:false});
              });
            }
            if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',fixMenus);}else{fixMenus();}
          })();
          </script>"""

          if '</head>' in html:
              html = html.replace('</head>', mobile_css + '\n</head>', 1)
          else:
              html = mobile_css + html
          if '</body>' in html:
              html = html.replace('</body>', mobile_js + '\n</body>', 1)
          else:
              html += mobile_js

          # â”€â”€ 3. CrÃ©er l'arborescence Android â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          densities = ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']
          for d in densities:
              os.makedirs(f'android/app/src/main/res/mipmap-{d}', exist_ok=True)
          for p in [
              'android/app/src/main/assets',
              'android/app/src/main/java/com/studiotibo/app',
              'android/app/src/main/res/values',
              'android/gradle/wrapper',
          ]:
              os.makedirs(p, exist_ok=True)

          # â”€â”€ 4. IcÃ´nes embarquÃ©es (base64 â†’ PNG) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          logos = {
              'mdpi':    '',
              'hdpi':    '',
              'xhdpi':   '',
              'xxhdpi':  '',
              'xxxhdpi': '',
          }
          for density, b64 in logos.items():
              png = base64.b64decode(b64)
              path = f'android/app/src/main/res/mipmap-{density}/ic_launcher.png'
              with open(path, 'wb') as f:
                  f.write(png)
              path_round = f'android/app/src/main/res/mipmap-{density}/ic_launcher_round.png'
              with open(path_round, 'wb') as f:
                  f.write(png)
              print(f'Icone {density} : {len(png)//1024} Ko')

          # â”€â”€ 5. HTML â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          with open('android/app/src/main/assets/index.html','w',encoding='utf-8') as f:
              f.write(html)
          print(f"HTML : {os.path.getsize('android/app/src/main/assets/index.html')//1024} Ko")

          # â”€â”€ 6. Fichiers Gradle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          open('android/settings.gradle','w').write('rootProject.name = "StudioTibo"\ninclude ":app"\n')
          open('android/build.gradle','w').write(
              'buildscript {\n    repositories { google(); mavenCentral() }\n'
              '    dependencies { classpath "com.android.tools.build:gradle:8.2.2" }\n'
              '}\nallprojects { repositories { google(); mavenCentral() } }\n')
          open('android/app/build.gradle','w').write(
              'plugins { id "com.android.application" }\n'
              'android {\n    namespace "com.studiotibo.app"\n    compileSdk 34\n'
              '    defaultConfig {\n        applicationId "com.studiotibo.app"\n'
              '        minSdk 26\n        targetSdk 34\n        versionCode 4\n'
              '        versionName "3.8.3"\n    }\n'
              '    buildTypes { debug { minifyEnabled false } }\n}\n'
              'dependencies { implementation "androidx.webkit:webkit:1.9.0" }\n')
          open('android/gradle.properties','w').write(
              'org.gradle.jvmargs=-Xmx2048m\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n')
          open('android/app/src/main/AndroidManifest.xml','w').write(
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
              '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <application android:label="Studio Tibo"\n'
              '        android:icon="@mipmap/ic_launcher"\n'
              '        android:roundIcon="@mipmap/ic_launcher_round"\n'
              '        android:theme="@style/AppTheme"\n'
              '        android:hardwareAccelerated="true">\n'
              '        <activity android:name=".MainActivity"\n'
              '            android:exported="true"\n'
              '            android:screenOrientation="user"\n'
              '            android:configChanges="orientation|screenSize|keyboardHidden">\n'
              '            <intent-filter>\n'
              '                <action android:name="android.intent.action.MAIN"/>\n'
              '                <category android:name="android.intent.category.LAUNCHER"/>\n'
              '            </intent-filter>\n'
              '        </activity>\n'
              '    </application>\n'
              '</manifest>\n')
          open('android/app/src/main/java/com/studiotibo/app/MainActivity.java','w').write(
              'package com.studiotibo.app;\nimport android.app.Activity;\nimport android.os.Bundle;\n'
              'import android.view.View;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\n'
              'import android.webkit.WebViewClient;\nimport android.webkit.WebChromeClient;\n'
              'public class MainActivity extends Activity {\n'
              '    @Override protected void onCreate(Bundle s) {\n'
              '        super.onCreate(s);\n        WebView wv = new WebView(this);\n'
              '        setContentView(wv);\n        WebSettings ws = wv.getSettings();\n'
              '        ws.setJavaScriptEnabled(true);\n        ws.setDomStorageEnabled(true);\n'
              '        ws.setMediaPlaybackRequiresUserGesture(false);\n'
              '        ws.setUseWideViewPort(true);\n        ws.setLoadWithOverviewMode(true);\n'
              '        ws.setSupportZoom(true);\n        ws.setBuiltInZoomControls(true);\n'
              '        ws.setDisplayZoomControls(false);\n'
              '        wv.setScrollBarStyle(View.SCROLLBARS_INSIDE_OVERLAY);\n'
              '        wv.setHorizontalScrollBarEnabled(true);\n'
              '        wv.setVerticalScrollBarEnabled(true);\n'
              '        wv.setWebViewClient(new WebViewClient());\n'
              '        wv.setWebChromeClient(new WebChromeClient());\n'
              '        wv
