name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: RÃ©cupÃ©rer le code
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Pillow
        run: pip install Pillow --quiet --break-system-packages

      - name: Trouver le HTML et le logo
        run: |
          HTML=$(find . -not -path './.git/*' -not -path './node_modules/*' \
                        -not -path './android/*' -name "*.html" 2>/dev/null | head -1)
          if [ -z "$HTML" ]; then
            ZIP=$(find . -not -path './.git/*' -name "*.zip" 2>/dev/null | head -1)
            if [ -n "$ZIP" ]; then
              mkdir -p _zip_tmp && unzip -q "$ZIP" -d _zip_tmp
              HTML=$(find _zip_tmp -name "*.html" | head -1)
            fi
          fi
          if [ -z "$HTML" ]; then echo "ERREUR : aucun HTML" && exit 1; fi
          echo "HTML_PATH=$HTML" >> $GITHUB_ENV

          LOGO=$(find . -not -path './.git/*' -not -path './android/*' \
                        -name "*.png" 2>/dev/null | head -1)
          [ -n "$LOGO" ] && echo "LOGO_PATH=$LOGO" >> $GITHUB_ENV
          echo "HTML: $HTML | Logo: $LOGO"

      - name: CrÃ©er le projet Android
        run: python3 setup_android.py

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler l'APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Extraire l'APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK : $(du -h "$APK" | cut -f1)"
          cp "$APK" out/studio-tibo.apk

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: studio-tibo-apk
          path: out/studio-tibo.apk
          retention-days: 30

      - name: Release (si tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/studio-tibo.apk
          name: STUDIO TIBO ${{ github.ref_name }}
          body: TÃ©lÃ©chargez studio-tibo.apk sur votre tÃ©lÃ©phone Android.
