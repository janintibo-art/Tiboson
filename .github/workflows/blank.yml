name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: RÃ©cupÃ©rer le code
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: CrÃ©er le projet Android et copier le HTML
        run: |
          python3 - << 'PYEOF'
          import os, shutil

          # Trouver le HTML compilÃ©
          candidates = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['node_modules', '.git', 'android']]
              for f in files:
                  if f.endswith('.html'):
                      candidates.append(os.path.join(root, f))
          print("HTML trouvÃ©s :", candidates)

          html = None
          for c in candidates:
              if '/dist/' in c or '/desktop/src/' in c:
                  html = c; break
          if not html and candidates:
              html = candidates[0]
          if not html:
              raise FileNotFoundError("Aucun fichier HTML trouvÃ© dans le repo !")
          print(f"Utilisation : {html}  ({os.path.getsize(html)//1024} Ko)")

          # CrÃ©er les dossiers
          for p in [
              'android/app/src/main/assets',
              'android/app/src/main/java/com/studiotibo/app',
              'android/app/src/main/res/values',
              'android/gradle/wrapper',
          ]:
              os.makedirs(p, exist_ok=True)

          shutil.copy(html, 'android/app/src/main/assets/index.html')
          print("HTML copiÃ© dans les assets")

          # Ã‰crire tous les fichiers du projet Android
          open('android/settings.gradle','w').write(
              'rootProject.name = "StudioTibo"\ninclude ":app"\n')

          open('android/build.gradle','w').write(
              'buildscript {\n'
              '    repositories { google(); mavenCentral() }\n'
              '    dependencies { classpath "com.android.tools.build:gradle:8.2.2" }\n'
              '}\n'
              'allprojects { repositories { google(); mavenCentral() } }\n')

          open('android/app/build.gradle','w').write(
              'plugins { id "com.android.application" }\n'
              'android {\n'
              '    namespace "com.studiotibo.app"\n'
              '    compileSdk 34\n'
              '    defaultConfig {\n'
              '        applicationId "com.studiotibo.app"\n'
              '        minSdk 26\n'
              '        targetSdk 34\n'
              '        versionCode 1\n'
              '        versionName "3.8.3"\n'
              '    }\n'
              '    buildTypes { debug { minifyEnabled false } }\n'
              '}\n'
              'dependencies { implementation "androidx.webkit:webkit:1.9.0" }\n')

          open('android/app/src/main/AndroidManifest.xml','w').write(
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
              '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <application\n'
              '        android:label="Studio Tibo"\n'
              '        android:theme="@style/AppTheme"\n'
              '        android:hardwareAccelerated="true">\n'
              '        <activity\n'
              '            android:name=".MainActivity"\n'
              '            android:exported="true"\n'
              '            android:screenOrientation="landscape"\n'
              '            android:configChanges="orientation|screenSize|keyboardHidden">\n'
              '            <intent-filter>\n'
              '                <action android:name="android.intent.action.MAIN"/>\n'
              '                <category android:name="android.intent.category.LAUNCHER"/>\n'
              '            </intent-filter>\n'
              '        </activity>\n'
              '    </application>\n'
              '</manifest>\n')

          open('android/app/src/main/java/com/studiotibo/app/MainActivity.java','w').write(
              'package com.studiotibo.app;\n'
              'import android.app.Activity;\n'
              'import android.os.Bundle;\n'
              'import android.webkit.WebSettings;\n'
              'import android.webkit.WebView;\n'
              'import android.webkit.WebViewClient;\n'
              'import android.webkit.WebChromeClient;\n'
              'public class MainActivity extends Activity {\n'
              '    @Override\n'
              '    protected void onCreate(Bundle savedInstanceState) {\n'
              '        super.onCreate(savedInstanceState);\n'
              '        WebView wv = new WebView(this);\n'
              '        setContentView(wv);\n'
              '        WebSettings s = wv.getSettings();\n'
              '        s.setJavaScriptEnabled(true);\n'
              '        s.setDomStorageEnabled(true);\n'
              '        s.setMediaPlaybackRequiresUserGesture(false);\n'
              '        s.setUseWideViewPort(false);\n'
              '        s.setLoadWithOverviewMode(false);\n'
              '        wv.setWebViewClient(new WebViewClient());\n'
              '        wv.setWebChromeClient(new WebChromeClient());\n'
              '        wv.loadUrl("file:///android_asset/index.html");\n'
              '    }\n'
              '}\n')

          open('android/app/src/main/res/values/styles.xml','w').write(
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<resources>\n'
              '    <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen"/>\n'
              '</resources>\n')

          open('android/gradle/wrapper/gradle-wrapper.properties','w').write(
              'distributionBase=GRADLE_USER_HOME\n'
              'distributionPath=wrapper/dists\n'
              'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip\n'
              'zipStoreBase=GRADLE_USER_HOME\n'
              'zipStorePath=wrapper/dists\n')

          print("Projet Android pret !")
          PYEOF

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler l'APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Extraire l'APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK : $APK"
          cp "$APK" out/studio-tibo.apk
          ls -lh out/studio-tibo.apk

      - name: Publier l'APK (onglet Actions > Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: studio-tibo-apk
          path: out/studio-tibo.apk
          retention-days: 30

      - name: Release automatique (si tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/studio-tibo.apk
          name: STUDIO TIBO ${{ github.ref_name }}
          body: |
            TÃ©lÃ©chargez studio-tibo.apk sur votre tÃ©lÃ©phone Android.
            (Autorisez les sources inconnues Ã  la premiÃ¨re installation.)
