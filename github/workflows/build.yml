      - name: Compiler l'APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Extraire et renommer l'APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK gÃ©nÃ©rÃ© : $APK"
          cp "$APK" out/studio-tibo.apk
          ls -lh out/studio-tibo.apk

      - name: TÃ©lÃ©charger l'APK (onglet Actions > Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: studio-tibo-apk
          path: out/studio-tibo.apk
          retention-days: 30

      - name: Publier en Release (si tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/studio-tibo.apk
          name: STUDIO TIBO ${{ github.ref_name }}
          body: |
            APK Android de STUDIO TIBO ${{ github.ref_name }}.
            TÃ©lÃ©chargez studio-tibo.apk, copiez-le sur votre tÃ©lÃ©phone et installez-le.
